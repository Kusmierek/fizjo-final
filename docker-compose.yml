services:
  next:
    build: .
    container_name: next-app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      - NODE_OPTIONS=--max-old-space-size=256

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - next
